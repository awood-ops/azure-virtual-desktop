name: AVD e2e — Reusable

on:
  workflow_call:
    inputs:
      scenario:
        required: true
        type: string
      location:
        required: false
        type: string
        default: uksouth
      run_azqr:
        description: 'Run AzQR best-practice scan'
        type: boolean
        default: false
      run_cost_estimate:
        description: 'Run cost estimate using Azure Retail Prices API'
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  e2e:
    name: ${{ inputs.scenario }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Preflight ───────────────────────────────────────────────────────────
      - name: Preflight (what-if)
        run: |
          az deployment sub what-if \
            --name "e2e-avd${{ github.run_number }}-${{ inputs.scenario }}" \
            --location "${{ inputs.location }}" \
            --template-file "tests/e2e/${{ inputs.scenario }}/main.test.bicep" \
            --parameters namePrefix="avd${{ github.run_number }}" location="${{ inputs.location }}"

      # ── Deploy ──────────────────────────────────────────────────────────────
      - name: Deploy
        id: deploy
        run: |
          output=$(az deployment sub create \
            --name "e2e-avd${{ github.run_number }}-${{ inputs.scenario }}" \
            --location "${{ inputs.location }}" \
            --template-file "tests/e2e/${{ inputs.scenario }}/main.test.bicep" \
            --parameters namePrefix="avd${{ github.run_number }}" location="${{ inputs.location }}" \
            --query "properties.outputs" -o json)

          echo "rg=$(echo $output | jq -r '.resourceGroupName.value')"           >> $GITHUB_OUTPUT
          echo "name_prefix=$(echo $output | jq -r '.moduleNamePrefix.value')"   >> $GITHUB_OUTPUT

      # ── Allow runner IP ─────────────────────────────────────────────────────
      - name: Allow runner IP on storage account
        id: allow_ip
        env:
          NAME_PREFIX: ${{ steps.deploy.outputs.name_prefix }}
          RG:          ${{ steps.deploy.outputs.rg }}
        run: |
          raw="${NAME_PREFIX}fslogix"
          sa_name=$(echo "$raw" | tr '[:upper:]' '[:lower:]' | tr -d '-')
          sa_name="${sa_name:0:24}"
          runner_ip=$(curl -sf https://api.ipify.org)

          echo "Adding $runner_ip to $sa_name network rules"
          az storage account network-rule add \
            --account-name "$sa_name" \
            --resource-group "$RG" \
            --ip-address "$runner_ip"

          echo "Waiting 30s for rule propagation..."
          sleep 30

          echo "sa_name=$sa_name"     >> $GITHUB_OUTPUT
          echo "runner_ip=$runner_ip" >> $GITHUB_OUTPUT

      # ── Pester ─────────────────────────────────────────────────────────────
      - name: Install Pester and Az modules
        shell: pwsh
        run: |
          Install-Module Pester                   -Force -Scope CurrentUser -MinimumVersion 5.0
          Install-Module Az.Accounts              -Force -Scope CurrentUser
          Install-Module Az.Resources             -Force -Scope CurrentUser
          Install-Module Az.Network               -Force -Scope CurrentUser
          Install-Module Az.KeyVault              -Force -Scope CurrentUser
          Install-Module Az.Storage               -Force -Scope CurrentUser
          Install-Module Az.DesktopVirtualization -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        env:
          TEST_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TEST_RG:           ${{ steps.deploy.outputs.rg }}
          TEST_NAME_PREFIX:  ${{ steps.deploy.outputs.name_prefix }}
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path         = 'tests/e2e/${{ inputs.scenario }}'
          $config.Run.Exit         = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputPath   = 'test-results-${{ inputs.scenario }}.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.scenario }}
          path: test-results-${{ inputs.scenario }}.xml

      # ── Remove runner IP ────────────────────────────────────────────────────
      - name: Remove runner IP from storage account
        if: ${{ !cancelled() }}
        run: |
          sa_name="${{ steps.allow_ip.outputs.sa_name }}"
          runner_ip="${{ steps.allow_ip.outputs.runner_ip }}"
          if [ -n "$sa_name" ] && [ -n "$runner_ip" ]; then
            echo "Removing $runner_ip from $sa_name"
            az storage account network-rule remove \
              --account-name "$sa_name" \
              --resource-group "${{ steps.deploy.outputs.rg }}" \
              --ip-address "$runner_ip" || true
          fi

      # ── AzQR ───────────────────────────────────────────────────────────────
      - name: AzQR scan
        id: azqr
        if: ${{ inputs.run_azqr }}
        env:
          RG:  ${{ steps.deploy.outputs.rg }}
          SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          echo "Downloading AzQR..."
          url=$(curl -sf https://api.github.com/repos/Azure/azqr/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux.*amd64|linux.*x86_64"; "i")) | .browser_download_url' \
            | head -1)
          curl -Lo azqr "$url" && chmod +x azqr

          mkdir -p azqr-results
          ./azqr scan \
            --subscription-id "$SUB" \
            --resource-group  "$RG"  \
            --output-path     ./azqr-results \
            --mask false || true

      - name: Upload AzQR report
        if: ${{ inputs.run_azqr && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: azqr-${{ inputs.scenario }}
          path: azqr-results/

      # ── Cost estimate ───────────────────────────────────────────────────────
      - name: Install Az.Compute for cost estimate
        if: ${{ inputs.run_cost_estimate }}
        shell: pwsh
        run: Install-Module Az.Compute -Force -Scope CurrentUser

      - name: Run cost estimate
        if: ${{ inputs.run_cost_estimate }}
        shell: pwsh
        env:
          TEST_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TEST_RG:           ${{ steps.deploy.outputs.rg }}
        run: |
          Set-AzContext -SubscriptionId $env:TEST_SUBSCRIPTION | Out-Null
          ./scripts/Get-CostEstimate.ps1 \
            -ResourceGroupName $env:TEST_RG \
            -Location          '${{ inputs.location }}' \
            -OutputPath        ./cost-estimate-results

      - name: Upload cost estimate
        if: ${{ inputs.run_cost_estimate && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cost-estimate-${{ inputs.scenario }}
          path: cost-estimate-results/

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Cleanup
        if: ${{ !cancelled() }}
        env:
          RG: ${{ steps.deploy.outputs.rg }}
          KV: ${{ steps.deploy.outputs.name_prefix }}-kv
        run: |
          if [ -n "$RG" ]; then
            echo "Deleting resource group: $RG"
            az group delete --name "$RG" --yes --no-wait || true

            echo "Purging soft-deleted Key Vault: $KV"
            az keyvault purge --name "$KV" --location "${{ inputs.location }}" 2>/dev/null || true
          fi
