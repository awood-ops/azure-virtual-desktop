name: AVD Module Tests (sha-ref diagnostic)

on:
  push:
    branches: [main]
    paths: ['bicep/**', 'tests/**', '.github/workflows/avd.module.yml']
  pull_request:
    paths: ['bicep/**', 'tests/**']
  workflow_dispatch:

jobs:
  psrule:
    name: PSRule for Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "psrule step"

  defaults:
    name: e2e / defaults
    needs: psrule
    uses: awood-ops/platform-workflows/.github/workflows/e2e.reusable.yml@2b059ee9cc8481fcbcd51d71f8c29ad49347c688
    with:
      scenario: defaults
    secrets: inherit
